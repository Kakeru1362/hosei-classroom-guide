<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--orange:#FF6600;--navy:#00205B;--bg:#F5F5F5;--card:#FFF;--text:#333;--sub:#666;--border:#E0E0E0;--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:linear-gradient(135deg,var(--navy) 0%,#003080 100%);color:#FFF;padding:16px 20px;text-align:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.15)}
header h1{font-size:18px;font-weight:700;letter-spacing:.5px}
header p{font-size:11px;color:rgba(255,255,255,.7);margin-top:4px}
.container{padding:16px;max-width:480px;margin:0 auto}
.section-label{font-size:13px;font-weight:600;color:var(--navy);margin:16px 0 8px;display:flex;align-items:center;gap:6px}
.section-label::before{content:'';width:3px;height:14px;background:var(--orange);border-radius:2px}
.input-area{display:flex;gap:8px;margin-bottom:8px}
.room-input{flex:1;height:48px;border:2px solid var(--border);border-radius:var(--radius);padding:0 16px;font-size:18px;font-weight:600;color:var(--navy);outline:none;transition:border .15s}
.room-input:focus{border-color:var(--orange)}
.room-input::placeholder{color:#ccc;font-weight:400}
.search-btn{height:48px;padding:0 20px;background:var(--orange);color:#FFF;border:none;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.search-btn:active{opacity:.8}
.hint{font-size:11px;color:var(--sub);margin-bottom:16px}

.result-card{background:var(--card);border-radius:var(--radius);box-shadow:0 2px 8px rgba(0,0,0,.08);overflow:hidden;margin-bottom:16px}
.result-header{background:linear-gradient(135deg,var(--navy),#003080);color:#FFF;padding:16px}
.result-header .room-name{font-size:24px;font-weight:700;color:var(--orange)}
.result-header .building-name{font-size:14px;margin-top:4px;opacity:.9}
.result-body{padding:16px}
.info-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-icon{width:32px;height:32px;background:var(--navy);color:#FFF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.info-label{font-size:11px;color:var(--sub)}
.info-value{font-size:15px;font-weight:600;color:var(--navy)}
.directions{background:#F0F4FF;border-radius:8px;padding:12px;margin-top:12px;font-size:13px;line-height:1.6;color:var(--text)}
.photo-section{margin-top:12px}
.photo-section img{width:100%;border-radius:8px;margin-bottom:8px}
.photo-label{font-size:11px;color:var(--sub);margin-bottom:4px;font-weight:600}
.error-msg{text-align:center;padding:40px 20px;color:var(--sub)}
.error-msg .icon{font-size:48px;margin-bottom:12px}
.error-msg .msg{font-size:15px;font-weight:500}
.error-msg .detail{font-size:12px;margin-top:8px;color:#999}

.quick-btns{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.quick-btn{padding:6px 12px;border:2px solid var(--border);border-radius:20px;background:var(--card);color:var(--text);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.quick-btn:active{background:var(--orange);color:#FFF;border-color:var(--orange)}

.fav-btn{position:absolute;top:12px;right:12px;width:40px;height:40px;border:none;background:rgba(255,255,255,.2);border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.fav-btn.saved{background:var(--orange)}
.result-header{position:relative}

.fav-list{list-style:none}
.fav-item{display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .15s}
.fav-item:active{background:#F0F4FF}
.fav-item-info{display:flex;align-items:center;gap:10px}
.fav-item-room{font-size:18px;font-weight:700;color:var(--navy)}
.fav-item-bldg{font-size:12px;color:var(--sub)}
.fav-item-floor{font-size:12px;color:var(--sub)}
.fav-remove{width:32px;height:32px;border:none;background:none;color:#ccc;font-size:18px;cursor:pointer;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:color .15s;flex-shrink:0}
.fav-remove:hover{color:#E74C3C}
.fav-empty{text-align:center;padding:40px 20px;color:var(--sub);font-size:13px}

.facility-list{list-style:none}
.facility-item{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:var(--radius);margin-bottom:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);cursor:pointer;transition:all .15s}

.facility-name{font-size:15px;font-weight:700;color:var(--navy)}
.facility-detail{font-size:11px;color:var(--sub);margin-top:2px}

function parseRoom(input) {
  var raw = input.trim().toUpperCase().replace(/\s+/g, '');
  if (!raw) return null;

  // ハイフン除去（BT09-01 → BT0901, S-201 → S201）
  raw = raw.replace(/[-‐‑–—―]/g, '');

  // BT付きパターン: BT0605
  if (raw.match(/^BT\d{4}$/)) {
    var nums = raw.substring(2);
    var floor = parseInt(nums.substring(0, 2));
    var room = nums.substring(2);
    return { building: 'BT', floor: floor, room: room, display: 'BT' + nums, original: input.trim() };
  }

  // S, G, Y, F パターン
  var prefixMatch = raw.match(/^([SGYF])(\d{3,})$/);
  if (prefixMatch) {
    var prefix = prefixMatch[1];
    var digits = prefixMatch[2];
    var floor = parseInt(digits.charAt(0));
    var room = digits.substring(1);
    return { building: prefix, floor: floor, room: room, display: raw, original: input.trim() };
  }

  // 数字のみ4桁 → ボアソナードタワー
  var numMatch = raw.match(/^\d{4}$/);
  if (numMatch) {
    var floor = parseInt(raw.substring(0, 2));
    var room = raw.substring(2);
    return { building: 'BT', floor: floor, room: room, display: 'BT' + raw, original: input.trim() };
  }

  return null;
}

// --- 検索結果セクション表示 ---
function showResult(html) {
  var section = document.getElementById('resultSection');
  var area = document.getElementById('resultArea');
  section.style.display = '';
  area.innerHTML = html;
}

// --- お気に入り ---
function getFavorites() {
  try { return JSON.parse(localStorage.getItem('favRooms') || '[]'); } catch(e) { return []; }
}

function saveFavorites(favs) {
  localStorage.setItem('favRooms', JSON.stringify(favs));
}

function isFavorite(display) {
  return getFavorites().indexOf(display) !== -1;
}

function toggleFavorite(display) {
  var favs = getFavorites();
  var idx = favs.indexOf(display);
  if (idx !== -1) {
    favs.splice(idx, 1);
  } else {
    favs.push(display);
  }
  saveFavorites(favs);
  renderFavButtons();
}

function renderFavButtons() {
  var favs = getFavorites();
  var section = document.getElementById('favSection');
  var area = document.getElementById('favBtns');
  if (favs.length === 0) {
    section.style.display = 'none';
    return;
  }
  section.style.display = '';
  var html = '';
  favs.forEach(function(roomStr) {
    html += '<button class="quick-btn" data-fav="' + roomStr + '">' + roomStr + '</button>';
  });
  area.innerHTML = html;
  area.querySelectorAll('.quick-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.getElementById('roomInput').value = this.dataset.fav;
      search();
    });
  });
}

function showResultInArea(roomStr) {
  var result = parseRoom(roomStr);
  if (!result) return;
  var bldg = BUILDINGS[result.building];
  if (!bldg) return;
  showResult(buildResultHTML(result, bldg));
  attachFavBtn(document.getElementById('resultArea'));
}

function buildResultHTML(result, bldg) {
  var floorValid = bldg.floors.indexOf(result.floor) !== -1;
  var favClass = isFavorite(result.display) ? ' saved' : '';

  var html = '<div class="result-card">';
  html += '<div class="result-header">';
  html += '<div class="room-name">' + result.display + '</div>';
  html += '<div class="building-name">' + bldg.name + '</div>';
  html += '<button class="fav-btn' + favClass + '" data-room="' + result.display + '">&#x2605;</button>';
  html += '</div>';
  html += '<div class="result-body">';
  html += '<div class="info-row"><div class="info-icon">&#x1F3E2;</div><div><div class="info-label">校舎</div><div class="info-value">' + bldg.name + '（' + bldg.short + '）</div></div></div>';
  html += '<div class="info-row"><div class="info-icon">&#x1F4CD;</div><div><div class="info-label">階数</div><div class="info-value">' + result.floor + '階</div></div></div>';
  if (!floorValid) {
    html += '<div class="info-row"><div class="info-icon" style="background:#E74C3C">!</div><div><div class="info-label">注意</div><div class="info-value" style="color:#E74C3C">' + result.floor + '階に教室フロアはありません（教室階: ' + bldg.floors.join(',') + '階）</div></div></div>';
  }
  html += '<div class="directions">' + bldg.directions + '</div>';
  html += '<div class="photo-section"><div class="photo-label">校舎外観</div>';
  html += '<img src="写真/校舎外観/' + bldg.name + '.jpg" alt="' + bldg.name + '"></div>';
  if (floorValid) {
    html += '<div class="photo-section"><div class="photo-label">' + result.floor + '階 フロアマップ</div>';
    html += '<img src="写真/フロアマップ/' + bldg.name + '/' + result.floor + 'F.' + bldg.floorExt + '" alt="' + result.floor + '階フロアマップ"></div>';
  }
  html += '</div></div>';
  return html;
}

function attachFavBtn(container) {
  container.querySelectorAll('.fav-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      toggleFavorite(this.dataset.room);
      this.classList.toggle('saved');
    });
  });
}

function search() {
  var input = document.getElementById('roomInput').value;
  var result = parseRoom(input);

  if (!result) {
    showResult('<div class="error-msg"><div class="icon">&#x1F50D;</div><div class="msg">教室番号を認識できませんでした</div><div class="detail">S201, G502, Y401, F301, 0605 などの形式で入力してください</div></div>');
    return;
  }

  var bldg = BUILDINGS[result.building];
  if (!bldg) {
    showResult('<div class="error-msg"><div class="icon">&#x26A0;&#xFE0F;</div><div class="msg">対応していない校舎です</div></div>');
    return;
  }

  showResult(buildResultHTML(result, bldg));
  attachFavBtn(document.getElementById('resultArea'));
}

    search();

}
